<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>さんまっ！ Sprint 3 Block 3-5</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main id="game" class="game">
    <section class="top-bar">
      <div class="brand">
        <div class="title">さんまっ！</div>
        <div class="subtitle">関西三麻を、もっと身近に。</div>
      </div>
      <div class="status-panel">
        <div id="roundText">東一局</div>
        <div id="turnText">東家の手番</div>
        <div id="wallText">山: --</div>
      </div>
      <button id="newGameButton" class="primary-button">新規開始</button>
    </section>

    <section class="table">
      <div class="center-board">
        <div class="dora-box">
          <span>ドラ表示</span>
          <div id="doraIndicator" class="tile small back">?</div>
        </div>
        <div class="message" id="message">新規開始を押してください</div>
        <button id="riichiButton" class="action-button" disabled>リーチ</button>
      </div>

      <div class="player-area player-east active" data-seat="east">
        <div class="seat-label">東家</div>
        <div class="flower-area" id="flowers-east"></div>
        <div class="meld-area" id="melds-east"></div>
        <div class="river river-east" id="river-east"></div>
        <div class="hand" id="hand-east"></div>
      </div>

      <div class="player-area player-south" data-seat="south">
        <div class="seat-label">南家</div>
        <div class="flower-area" id="flowers-south"></div>
        <div class="meld-area" id="melds-south"></div>
        <div class="river river-south" id="river-south"></div>
        <div class="hand vertical" id="hand-south"></div>
      </div>

      <div class="player-area player-west" data-seat="west">
        <div class="seat-label">西家</div>
        <div class="flower-area" id="flowers-west"></div>
        <div class="meld-area" id="melds-west"></div>
        <div class="river river-west" id="river-west"></div>
        <div class="hand vertical" id="hand-west"></div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
